version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - revive
    - gocyclo
    - gocognit
    - misspell
    - unused
  settings:
    gocyclo:
      min-complexity: 20
    gocognit:
      min-complexity: 25
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: receiver-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-naming
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit

formatters:
  enable:
    - gofumpt
    - goimports
