version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - staticcheck
    - revive
    - gocyclo
    - gocognit
    - misspell
    - unused
  # depguard locks the hexagonal layering. Every rule is in strict mode
  # with an explicit allowlist, so any new import that doesn't fit the
  # layer's contract fails the lint. Layer contracts:
  #   domain      → stdlib only; no I/O packages, no third-party libs.
  #   ports       → domain + stdlib; declares interfaces, never uses them.
  #   usecase     → domain + ports + stdlib; consumes ports for all I/O.
  #   adapter/<n> → domain + ports + stdlib + opted-in 3rd-party (e.g.
  #                 glamour for glamourrenderer). Sibling adapters and
  #                 usecase/frontend layers are denied.
  #   frontend/cli → domain + ports + usecase + cobra + bubbletea +
  #                  frontend/tui/components/theme + frontend/tui/sidekick.
  #                  bubbletea + theme stay because SidekickDeps factories
  #                  are typed `func(theme.Palette) tea.Model`.
  #   frontend/tui → domain (read-only) + ports + usecase + bubbletea +
  #                  lipgloss + bubbles/* + glamour + termenv + sahilm/fuzzy
  #                  + frontend/tui/components. Sibling-screen imports are
  #                  denied via strict mode; the sidekick root composes
  #                  screens as tea.Model.
  # cmd/flow is intentionally outside the rule set: it is the composition
  # root and may import any layer to wire adapters into use cases.
  settings:
    depguard:
      rules:
        domain:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: os
              desc: "domain layer must stay I/O-free; use a port instead"
            - pkg: os/exec
              desc: "domain layer must stay I/O-free; use a port instead"
            - pkg: net
              desc: "domain layer must stay I/O-free; use a port instead"
            - pkg: net/http
              desc: "domain layer must stay I/O-free; use a port instead"
            - pkg: database/sql
              desc: "domain layer must stay I/O-free; use a port instead"
            - pkg: path/filepath
              desc: "domain layer must stay path-agnostic; use a port instead"
        ports:
          list-mode: strict
          files:
            - "**/internal/ports/**"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/domain
          deny:
            - pkg: os
              desc: "ports declare interfaces only; os belongs in adapters"
            - pkg: os/exec
              desc: "ports declare interfaces only; os/exec belongs in adapters"
            - pkg: net
              desc: "ports declare interfaces only; net belongs in adapters"
            - pkg: net/http
              desc: "ports declare interfaces only; net/http belongs in adapters"
            - pkg: database/sql
              desc: "ports declare interfaces only; database/sql belongs in adapters"
            - pkg: path/filepath
              desc: "ports declare interfaces only; path/filepath belongs in adapters"
        usecase:
          list-mode: strict
          files:
            - "**/internal/usecase/**"
            - "!**/internal/usecase/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/domain
            - github.com/serverkraken/flow/internal/ports
          deny:
            - pkg: os
              desc: "use cases consume ports for I/O; os belongs in adapters"
            - pkg: os/exec
              desc: "use cases consume ports for I/O; os/exec belongs in adapters"
            - pkg: net
              desc: "use cases consume ports for I/O; net belongs in adapters"
            - pkg: net/http
              desc: "use cases consume ports for I/O; net/http belongs in adapters"
            - pkg: database/sql
              desc: "use cases consume ports for I/O; database/sql belongs in adapters"
            - pkg: path/filepath
              desc: "use cases consume ports for I/O; path/filepath belongs in adapters"
        # Kompendium subtree mirrors the same hexagonal layering as flow's
        # own (domain → ports → usecase → adapter → frontend), but lives
        # in its own `internal/kompendium/...` namespace. Globs like
        # `**/internal/domain/**` do NOT match `internal/kompendium/domain/`
        # (the path segments aren't consecutive), so each kompendium layer
        # gets its own rule. domain-style is deny-only (yaml.v3 in
        # frontmatter parsing is accepted; see CLAUDE-kompendium-plan §8).
        kompendium-domain:
          files:
            - "**/internal/kompendium/domain/**"
          deny:
            - pkg: os
              desc: "kompendium domain layer must stay I/O-free; use a port instead"
            - pkg: os/exec
              desc: "kompendium domain layer must stay I/O-free; use a port instead"
            - pkg: net
              desc: "kompendium domain layer must stay I/O-free; use a port instead"
            - pkg: net/http
              desc: "kompendium domain layer must stay I/O-free; use a port instead"
            - pkg: database/sql
              desc: "kompendium domain layer must stay I/O-free; use a port instead"
            - pkg: path/filepath
              desc: "kompendium domain layer must stay path-agnostic; use a port instead"
        kompendium-ports:
          list-mode: strict
          files:
            - "**/internal/kompendium/ports/**"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/kompendium/domain
        kompendium-usecase:
          list-mode: strict
          files:
            - "**/internal/kompendium/usecase/**"
            - "!**/internal/kompendium/usecase/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/kompendium/domain
            - github.com/serverkraken/flow/internal/kompendium/ports
        # The kompendium-adapter rule allowlists kompendium-only domain/ports
        # plus the single third-party dep an adapter currently needs:
        # `modernc.org/sqlite` (pure-Go SQLite driver) for sqliteindex. The
        # blank import `_ "modernc.org/sqlite"` registers the "sqlite"
        # database/sql driver and is the only kompendium-adapter dep beyond
        # stdlib; gitrepo / gitsnapshot / tarsnapshot / legacysource /
        # nvimeditor / fsstore are stdlib-only. Test files are excluded so
        # white-box tests can reach unexported helpers without weakening
        # the rule.
        kompendium-adapter:
          list-mode: strict
          files:
            - "**/internal/kompendium/adapter/**"
            - "!**/internal/kompendium/adapter/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/kompendium/domain
            - github.com/serverkraken/flow/internal/kompendium/ports
            # flow/ports is allowed so kompendium adapters can satisfy
            # flow-defined cross-boundary ports (today: WikilinkResolver
            # for the shared markdown renderer; later K4 may add more
            # gateway ports for the in-process kompendiumlib bridge).
            - github.com/serverkraken/flow/internal/ports
            - modernc.org/sqlite
        # The kompendium-frontend-cli rule mirrors flow's frontend-cli
        # rule but for the kompendium subtree. Allowlist: stdlib +
        # kompendium/{domain,ports,usecase} + cobra + bubbletea + the
        # two TUI subpackages browse/write hands off to (browse and
        # writepicker). The cobra-side handlers stay thin shells; the
        # heavy lifting lives in the TUI subpackages.
        kompendium-frontend-cli:
          list-mode: strict
          files:
            - "**/internal/kompendium/frontend/cli/**"
            - "!**/internal/kompendium/frontend/cli/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/kompendium/domain
            - github.com/serverkraken/flow/internal/kompendium/ports
            - github.com/serverkraken/flow/internal/kompendium/usecase
            - github.com/serverkraken/flow/internal/kompendium/frontend/tui/browse
            - github.com/serverkraken/flow/internal/kompendium/frontend/tui/writepicker
            - github.com/charmbracelet/bubbletea
            - github.com/spf13/cobra
        # The kompendium-frontend-tui rule mirrors flow's frontend-tui
        # rule but for the kompendium subtree. Allowlist: stdlib +
        # kompendium/{domain,ports,usecase} + the shared markdown
        # renderer + flow/ports (for WikilinkResolver) + bubbletea +
        # widgets + lipgloss/cellbuf/ansi. The browse → view sibling
        # import is allowed explicitly because view is browse's
        # in-process full-screen detail viewer, not a peer screen.
        kompendium-frontend-tui:
          list-mode: strict
          files:
            - "**/internal/kompendium/frontend/tui/**"
            - "!**/internal/kompendium/frontend/tui/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/kompendium/domain
            - github.com/serverkraken/flow/internal/kompendium/ports
            - github.com/serverkraken/flow/internal/kompendium/usecase
            - github.com/serverkraken/flow/internal/kompendium/frontend/tui/view
            # browse embeds writepicker in-process so the new-note picker
            # lives inside the browse program rather than as a forked
            # `flow kompendium write` subprocess. The fork-and-nest model
            # failed at /dev/tty negotiation under tea.ExecProcess in
            # bubbletea v1.3.x — surface error was »Fehler beim
            # Bearbeiten: exit status 1« with no picker rendering at all.
            - github.com/serverkraken/flow/internal/kompendium/frontend/tui/writepicker
            - github.com/serverkraken/flow/internal/frontend/tui/markdown
            - github.com/serverkraken/flow/internal/frontend/tui/markdown/theme
            # Canonical theme + the components-kit. P4a migrated browse,
            # view and writepicker off the deprecated markdown/theme
            # shims onto canonical theme.Default; P4c lifted browse's
            # hand-rolled DoubleBorder modal onto components/modal.
            - github.com/serverkraken/flow/internal/frontend/tui/theme
            - github.com/serverkraken/flow/internal/frontend/tui/components/modal
            - github.com/serverkraken/flow/internal/ports
            - github.com/charmbracelet/bubbletea
            - github.com/charmbracelet/bubbles
            - github.com/charmbracelet/lipgloss
            - github.com/charmbracelet/x/ansi
            - github.com/charmbracelet/x/cellbuf
        # The markdown rule covers both the renderer at
        # internal/frontend/tui/markdown/ and its sibling theme subpackage.
        # Allowlist is tight: stdlib + the WikilinkResolver port +
        # goldmark + chroma + lipgloss + cellbuf + termenv + ansi. No
        # kompendium imports — the renderer is fully decoupled from
        # the kompendium subtree per K3.B's exit criteria. Test files
        # are excluded so white-box tests can poke at unexported helpers.
        markdown:
          list-mode: strict
          files:
            - "**/internal/frontend/tui/markdown/**"
            - "!**/internal/frontend/tui/markdown/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/ports
            - github.com/serverkraken/flow/internal/frontend/tui/markdown/theme
            # Canonical theme — markdown.Render takes a theme.Palette via
            # WithPalette option (P2). MarkdownRolesFor reads from it.
            - github.com/serverkraken/flow/internal/frontend/tui/theme
            - github.com/yuin/goldmark
            - github.com/yuin/goldmark/ast
            - github.com/yuin/goldmark/extension
            - github.com/yuin/goldmark/extension/ast
            - github.com/yuin/goldmark/parser
            - github.com/yuin/goldmark/renderer
            - github.com/yuin/goldmark/text
            - github.com/yuin/goldmark/util
            - github.com/alecthomas/chroma/v2
            - github.com/alecthomas/chroma/v2/lexers
            - github.com/charmbracelet/lipgloss
            - github.com/charmbracelet/x/ansi
            - github.com/charmbracelet/x/cellbuf
            - github.com/muesli/termenv
        adapter:
          list-mode: strict
          files:
            - "**/internal/adapter/**"
            - "!**/internal/adapter/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/domain
            - github.com/serverkraken/flow/internal/ports
            # Shared adapter-internal helpers. These are NOT ports — they
            # are tiny implementation utilities other adapters consume:
            #   atomicfile  →  write-temp-then-rename for crash safety
            #   textscan    →  bufio.Scanner with a larger MaxScanTokenSize
            #                  for long markdown / brief lines
            # Keeping them in adapter/ (not moving to a separate "lib/")
            # is intentional: they are I/O-flavoured (filesystem +
            # bufio) and thus belong in the adapter layer; the depguard
            # rule allows the cross-adapter import explicitly so other
            # adapters don't have to re-implement the same atomic-write
            # or large-line-scanner each time.
            - github.com/serverkraken/flow/internal/adapter/atomicfile
            - github.com/serverkraken/flow/internal/adapter/textscan
        frontend-cli:
          list-mode: strict
          files:
            - "**/internal/frontend/cli/**"
            - "!**/internal/frontend/cli/**_test.go"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/domain
            - github.com/serverkraken/flow/internal/ports
            - github.com/serverkraken/flow/internal/usecase
            - github.com/spf13/cobra
            # sidekick.go drives the bubbletea program for `flow sidekick`
            # via the frontend/tui/sidekick root model. The factories on
            # SidekickDeps are typed `func(theme.Palette) tea.Model`, so
            # bubbletea + theme stay on the allowlist alongside sidekick.
            # cheatsheet.go (`flow cheatsheet` standalone command, F-WAVE)
            # constructs the cheatsheet screen directly because the verb
            # is a one-screen program — sidekick would be overkill.
            - github.com/charmbracelet/bubbletea
            - github.com/serverkraken/flow/internal/frontend/tui/components/theme
            - github.com/serverkraken/flow/internal/frontend/tui/screen/cheatsheet
            - github.com/serverkraken/flow/internal/frontend/tui/sidekick
            # markdown.go (`flow markdown view <file>` standalone command)
            # hosts the kompendium viewer directly so a plain Markdown
            # file gets the same render pipeline (glamour + OSC 8 + search
            # + code-snippet copy) as a kompendium note. Wikilink resolver
            # is passed nil — free-floating files have no notebook context.
            # The tui/markdown + lipgloss + termenv imports cover the
            # `--raw` mode: bypass the TUI, force truecolor (otherwise
            # lipgloss detects Ascii on a piped stdout and strips every
            # SGR), and write pre-rendered ANSI to stdout.
            - github.com/serverkraken/flow/internal/kompendium/frontend/tui/view
            - github.com/serverkraken/flow/internal/frontend/tui/markdown
            - github.com/charmbracelet/lipgloss
            - github.com/muesli/termenv
        # The markdown rule below claims internal/frontend/tui/markdown/**
        # for itself (renderer + theme subpackage); excluding it here lets
        # those files keep a tight goldmark/chroma allowlist without
        # bleeding those deps into every other TUI screen.
        frontend-tui:
          list-mode: strict
          files:
            - "**/internal/frontend/tui/**"
            - "!**/internal/frontend/tui/**_test.go"
            - "!**/internal/frontend/tui/markdown/**"
          allow:
            - $gostd
            - github.com/serverkraken/flow/internal/domain
            - github.com/serverkraken/flow/internal/ports
            - github.com/serverkraken/flow/internal/usecase
            - github.com/serverkraken/flow/internal/frontend/tui/components
            # The canonical token package (theme.Palette + Sem + tokens +
            # builders + contrast). Live-source for every component and
            # the markdown role mapper since P1; readable from any
            # frontend/tui file without going through components/theme.
            - github.com/serverkraken/flow/internal/frontend/tui/theme
            # Sidekick imports screen/palette for the SwitchScreenMsg
            # type (palette emits this when a picked entry's action is a
            # flow-internal screen switch — sidekick catches it and
            # updates m.current). This is the only sibling-screen
            # import in the codebase; if a second one shows up, carve a
            # dedicated sidekick rule instead of widening this allow.
            - github.com/serverkraken/flow/internal/frontend/tui/screen/palette
            # The bubbletea + lipgloss UI vocabulary — bubbles wraps the
            # widget primitives screens hold directly (textinput.Model,
            # viewport.Model, spinner.Model). termenv configures TrueColor
            # for theme.Init; sahilm/fuzzy is the ranking primitive used
            # by the palette and projects screens. Markdown rendering is
            # served by the dedicated markdown rule (above). Sibling-
            # screen imports stay denied: strict mode rejects anything
            # not on this list, including frontend/tui/screen/<name>
            # peers (with the documented sidekick-only exception above).
            - github.com/charmbracelet/bubbletea
            - github.com/charmbracelet/bubbles
            - github.com/charmbracelet/lipgloss
            - github.com/muesli/termenv
            - github.com/sahilm/fuzzy
    gocyclo:
      min-complexity: 20
    gocognit:
      min-complexity: 25
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: receiver-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-naming
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
      # testutil is test infrastructure — every exported helper is by
      # design a tiny one-line method against an interface, and a doc
      # comment for each adds noise without information.
      - path: internal/testutil/
        linters:
          - revive
        text: "exported"

formatters:
  enable:
    - gofumpt
    - goimports
