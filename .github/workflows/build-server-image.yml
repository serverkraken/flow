name: Build flow-server image

# Builds the flow-server container image and pushes to GHCR.
#
# Triggers on push to BOTH `next` and `main`:
#   - `next` is the long-lived integration branch where Plan E + F land.
#     Tagged with the branch name (`:next`) plus the commit SHA so M8/M9
#     work produces buildable artifacts before any merge to main.
#   - `main` is the stable branch. Tagged with the commit SHA plus
#     `:latest`.
#
# Multi-arch: linux/amd64 (typical K8s nodes) + linux/arm64 (Apple Silicon
# dev boxes, increasingly common on cluster nodes too). QEMU emulates the
# off-host arch via docker/setup-qemu-action.
#
# Build cache: GitHub Actions cache scoped to `flow-server` so concurrent
# branches don't trample each other's layers.

on:
  push:
    branches: [main, next]
    paths:
      - 'cmd/flow-server/**'
      - 'internal/**'
      - 'tools/tailwind/**'
      - 'tools/codemirror/**'
      - 'deploy/podman/Dockerfile.server'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/build-server-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # runtime/debug.ReadBuildInfo stamps VCS revision from the .git
          # tree inside the build context — needs full history, not a
          # shallow clone, so the stamp matches the pushed SHA.
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/flow-server"
          TAGS="${IMAGE}:${{ github.sha }}"
          BRANCH="${GITHUB_REF##*/}"
          if [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          else
            TAGS="${TAGS},${IMAGE}:${BRANCH}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Computed tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/podman/Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=flow-server
          cache-from: type=gha,scope=flow-server
          cache-to: type=gha,mode=max,scope=flow-server
          build-args: |
            VERSION=${{ github.sha }}
