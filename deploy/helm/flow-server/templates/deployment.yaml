apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flow-server.fullname" . }}
  labels:
    {{- include "flow-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Stateless seit R1 (Postgres via CNPG) — Recreate war ein SQLite-
  # Single-Writer-Zwang und ist Geschichte.
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "flow-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flow-server.selectorLabels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      serviceAccountName: {{ include "flow-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: flow-server
          image: {{ include "flow-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            # ConfigMap + Secret are created in Task 4. optional: true keeps
            # the skeleton lint-clean even when they don't exist yet.
            - configMapRef:
                name: {{ include "flow-server.fullname" . }}-config
                optional: true
            - secretRef:
                name: {{ include "flow-server.fullname" . }}-secret
                optional: true
          env:
            - name: FLOW_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: {{ .Values.postgres.secretKey }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.resources.flowServer | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            # /tmp is writable scratch even with readOnlyRootFilesystem.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
