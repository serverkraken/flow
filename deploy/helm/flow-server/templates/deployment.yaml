apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flow-server.fullname" . }}
  labels:
    {{- include "flow-server.labels" . | nindent 4 }}
spec:
  # SQLite is single-writer. Hard-coded to 1 here regardless of
  # .Values.replicaCount — see Chart.yaml note.
  replicas: 1
  # Recreate strategy: kill the old pod before the new one starts so the
  # SQLite file is never opened by two writers at once. RollingUpdate would
  # briefly have both pods running and risk corruption.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "flow-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flow-server.selectorLabels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      serviceAccountName: {{ include "flow-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: flow-server
          image: {{ include "flow-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            # ConfigMap + Secret are created in Task 4. optional: true keeps
            # the skeleton lint-clean even when they don't exist yet.
            - configMapRef:
                name: {{ include "flow-server.fullname" . }}-config
                optional: true
            - secretRef:
                name: {{ include "flow-server.fullname" . }}-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.resources.flowServer | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: flow-data
              mountPath: /var/lib/flow
            # /tmp is writable scratch even with readOnlyRootFilesystem.
            - name: tmp
              mountPath: /tmp
        {{- if .Values.litestream.enabled }}
        - name: litestream
          image: {{ .Values.litestream.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - replicate
            - {{ .Values.flow.serverDBPath | quote }}
            - {{ .Values.litestream.replicaURL | quote }}
          env:
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "flow-server.fullname" . }}-secret
                  key: LITESTREAM_ACCESS_KEY_ID
                  optional: true
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "flow-server.fullname" . }}-secret
                  key: LITESTREAM_SECRET_ACCESS_KEY
                  optional: true
          resources:
            {{- toYaml .Values.resources.litestream | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: flow-data
              mountPath: /var/lib/flow
        {{- end }}
      volumes:
        - name: flow-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "flow-server.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
