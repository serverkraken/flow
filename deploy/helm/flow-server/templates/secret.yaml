{{/*
Secret holding OIDC client secret, cookie hash/block keys, and litestream
S3 credentials. Keys map 1:1 onto container env var names — the Deployment
wires the FLOW_* keys via envFrom: secretRef and the LITESTREAM_* keys via
explicit secretKeyRef into the sidecar.

stringData is used so values pass through verbatim. For sealed-secrets or
external-secrets flows, replace this Secret with one of those instead.

Hard-fails at install time when a mandatory field is empty so we never
deploy a broken server. Litestream creds are only required when
.Values.litestream.enabled — the deployment.yaml marks them optional.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flow-server.fullname" . }}-secret
  labels:
    {{- include "flow-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  FLOW_OIDC_CLIENT_SECRET: {{ required "secret.oidcClientSecret is required — Authentik confidential client secret" .Values.secret.oidcClientSecret | quote }}
  FLOW_COOKIE_HASH_KEY: {{ required "secret.cookieHashKey is required — generate with: openssl rand -hex 32" .Values.secret.cookieHashKey | quote }}
  FLOW_COOKIE_BLOCK_KEY: {{ required "secret.cookieBlockKey is required — generate with: openssl rand -hex 32" .Values.secret.cookieBlockKey | quote }}
  {{- if .Values.litestream.enabled }}
  LITESTREAM_ACCESS_KEY_ID: {{ .Values.secret.litestreamAccessKeyID | quote }}
  LITESTREAM_SECRET_ACCESS_KEY: {{ .Values.secret.litestreamSecretAccessKey | quote }}
  {{- end }}
