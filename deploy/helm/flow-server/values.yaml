# Default values for flow-server.
# See deploy/helm/flow-server/README.md for the full reference.

image:
  repository: ghcr.io/serverkraken/flow-server
  # tag falls back to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

# flow-server runtime config. All values land in a ConfigMap and are
# wired into the container via envFrom. The names mirror the FLOW_* env vars
# read by internal/adapter/httpserver/config.go.
flow:
  # FLOW_SERVER_ADDR — listen address inside the pod.
  serverAddr: ":8080"
  # FLOW_SERVER_BASE_URL — public URL the OIDC redirect-handler advertises.
  # Must match the Authentik client's redirect-uri (BaseURL + /auth/callback).
  serverBaseURL: "https://flow.example.com"
  # FLOW_OIDC_ISSUER — Authentik application URL (trailing slash matters).
  oidcIssuer: "https://auth.example.com/application/o/flow/"
  # FLOW_OIDC_CLI_ISSUER — issuer of the public CLI/device-flow provider.
  # Authentik's per_provider mode gives the flow-cli Application a DISTINCT
  # issuer (.../o/flow-cli/); flow-server runs a second verifier for it.
  # REQUIRED for `flow login` when the IdP issues per-provider issuers. Leave
  # empty only for single-issuer IdPs (e.g. local dex) — the server then falls
  # back to FLOW_OIDC_ISSUER.
  oidcCLIIssuer: ""
  # FLOW_OIDC_CLIENT_ID — the confidential client ID used by the WebUI.
  oidcClientID: "flow-server"
  # FLOW_ALLOWED_SUBS — comma-separated OIDC 'sub' values that may log in.
  # Required; set via --set flow.allowedSubs=... or a values override.
  allowedSubs: ""

# Postgres DSN via CNPG app secret. The secret must exist in the release
# namespace before install. CNPG names it "<cluster-name>-app" by default
# and stores the DSN under the "uri" key.
postgres:
  # Name des Secrets mit der DSN (CNPG: "<cluster-name>-app") und der Key
  # darin. Das Secret muss im Release-Namespace existieren.
  existingSecret: "flow-pg-app"
  secretKey: "uri"

# Secret-only values. These land in a Kubernetes Secret and are
# wired into the container via envFrom: secretRef.
secret:
  # FLOW_OIDC_CLIENT_SECRET — Authentik client secret. Required.
  oidcClientSecret: ""
  # FLOW_COOKIE_HASH_KEY — 64 hex chars (32 bytes). Generate with:
  #   openssl rand -hex 32
  cookieHashKey: ""
  # FLOW_COOKIE_BLOCK_KEY — 64 hex chars (32 bytes). Generate with:
  #   openssl rand -hex 32
  cookieBlockKey: ""

ingress:
  enabled: true
  className: nginx
  host: flow.example.com
  # cert-manager ClusterIssuer name used for automatic TLS provisioning.
  # The chart adds the cert-manager.io/cluster-issuer annotation for you;
  # override here if you use a Namespace-scoped Issuer or staging issuer.
  certManagerIssuer: letsencrypt-prod
  # Extra annotations merged into the Ingress object. Use for nginx-specific
  # tunings (proxy-body-size, etc.) or to override the cert-manager hook.
  annotations: {}
  tls:
    enabled: true
    secretName: flow-server-tls

resources:
  flowServer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# /metrics is wired in Plan F · Task 6. Flip metrics.enabled to true once
# that lands.
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    # Prometheus scrape interval. Only used when serviceMonitor.enabled=true.
    interval: 30s
    # Hard timeout for a single scrape. Must be < interval.
    scrapeTimeout: 10s
    labels: {}

# Pod-level overrides. Empty by default; useful for nodeSelector/tolerations
# when running on dedicated nodes.
nodeSelector: {}
tolerations: []
affinity: {}

# securityContext applied to the pod. Distroless nonroot is uid/gid 65532.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# Container-level securityContext applied to flow-server.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  # Skip ServiceAccount creation in the skeleton; Task 4 may add it.
  create: false
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 80

# Override the chart's name + fullname computations. Empty means use the
# defaults from _helpers.tpl.
nameOverride: ""
fullnameOverride: ""
