apiVersion: v2
name: flow-server
description: |
  flow-server — server-only truth HTTP API + WebUI for flow (R1).
  Stateless; persistence lives in a CloudNativePG cluster whose app
  secret (key `uri`) is referenced via postgres.existingSecret.
type: application

# Chart version follows independently of the app — bump on chart changes.
version: 0.2.0

# Image tag falls back to .Chart.AppVersion when values.image.tag is empty.
# Keep this in sync with the latest flow release tag.
appVersion: "0.1.0"

maintainers:
  - name: serverkraken
    url: https://github.com/serverkraken/flow

home: https://github.com/serverkraken/flow
sources:
  - https://github.com/serverkraken/flow

keywords:
  - flow
  - worktime
  - postgres
  - cnpg
  - selfhosted
